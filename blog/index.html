    body {

      margin-bottom: 40px;

    }

    /* Article cards */
    .articles {
      display: flex;
      flex-direction: column;
      gap: var(--sp-4);
    }
    .article-card {
      display: block;
      background: var(--card);
      border: 1px solid var(--silver);
      border-radius: 12px;
      padding: var(--sp-6);
      text-decoration: none;
      color: var(--ink);
      transition: border-color .15s, box-shadow .15s;
    }
    .article-card:hover {
      border-color: var(--primary);
      box-shadow: 0 2px 12px rgba(224,104,48,.08);
    }
    .article-meta {
      display: flex;
      align-items: center;
      gap: var(--sp-3);
      margin-bottom: var(--sp-3);
    }
    .article-tag {
      font-size: 11px;
      font-weight: 600;
      color: var(--primary);
      background: var(--primary-light);
      border-radius: 6px;
      padding: 2px 8px;
    }
    .article-date {
      font-size: 12px;
      color: var(--gray);
    }
    .article-card h2 {
      font-size: 17px;
      font-weight: 600;
      margin-bottom: 6px;
      line-height: 1.5;
    }
    .article-card p {
      font-size: 14px;
      color: var(--charcoal);

      font-size: 16px;
      font-weight: 700;
      color: var(--muted);
      letter-spacing: 2px;

    .ft-links {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: var(--sp-5);
      margin-bottom: var(--sp-3);
    }
    .ft-links a {
      font-size: 12px;
      color: var(--gray);
      text-decoration: none;
